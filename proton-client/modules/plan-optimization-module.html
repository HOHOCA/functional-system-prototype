<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计划优化 - MOZI Proton</title>
    <link rel="stylesheet" href="../../shared/styles/styles.css">
    <link rel="stylesheet" href="../../shared/styles/styles_view_3d.css">
    <link rel="stylesheet" href="../../shared/styles/styles_dvh.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            color: #ffffff;
        }

        .plan-optimization-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            background: #1a1a1a;
            /* 与下方左侧栏一致：顶部患者区宽度 = 页签 + 内容区（内容区含内部纵向滚动条） */
            --td-left-tabs-width: 48px;
            --td-left-content-width: 280px;
        }

        .top-area {
            display: flex;
            height: 80px;
            flex-shrink: 0;
            border-bottom: 1px solid #404040;
        }

        .patient-overview {
            width: calc(var(--td-left-tabs-width) + var(--td-left-content-width));
            flex: 0 0 calc(var(--td-left-tabs-width) + var(--td-left-content-width));
            min-width: calc(var(--td-left-tabs-width) + var(--td-left-content-width));
            background: #2a2a2a;
            border-right: 1px solid #404040;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
        }

        .toolbar-area {
            flex: 1;
            min-width: 0; /* 允许收缩，触发内部工具栏横向滚动 */
            background: #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .content-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .main-content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .left-sidebar-tabs {
            width: var(--td-left-tabs-width);
            background: #252525;
            border-right: 1px solid #404040;
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            gap: 4px;
        }

        .sidebar-tab {
            width: 100%;
            min-height: 80px;
            padding: 12px 0;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 13px;
            letter-spacing: 4px;
            font-weight: 500;
        }

        .sidebar-tab:hover {
            background: #2a2a2a;
            color: #ffffff;
        }

        .sidebar-tab.active {
            background: #2a2a2a;
            color: #3AACDE;
            border-left-color: #3AACDE;
        }

        .left-sidebar-content {
            width: var(--td-left-content-width);
            background: #2a2a2a;
            border-right: 1px solid #404040;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-content-panel {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
        }

        .sidebar-content-panel.active {
            display: flex;
        }

        .sidebar-panel-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .main-display-area {
            display: contents;
        }

        .view-row-1,
        .view-row-2 {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #1a1a1a;
            padding: 2px;
            min-height: 0;
        }

        .view-row-2-split {
            grid-column: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            min-height: 0;
        }

        .view-panel {
            background: #000000;
            border: 1px solid #404040;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .bottom-control-panel {
            flex: 1;
            min-height: 0;
            background: #2a2a2a;
            border-top: 1px solid #404040;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 计划优化页底部壳子：左右 4:1 分栏 */
        #bottomControlPanel {
            flex-direction: row;
        }

        #bottomControlLeft {
            flex: 4;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        #bottomControlRight {
            flex: 1;
            border-left: 1px solid #404040;
        }

        .bottom-control-tabs {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #252525;
            border-bottom: 1px solid #404040;
            padding: 0;
            flex-shrink: 0;
        }

        .bottom-control-tabs-left {
            display: flex;
            flex: 1;
        }

        .bottom-control-tabs-right {
            display: flex;
            align-items: center;
            padding-right: 8px;
            gap: 4px;
        }

        .bottom-control-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .bottom-control-tab:hover {
            color: #ffffff;
            background: #2a2a2a;
        }

        .bottom-control-tab.active {
            color: #3AACDE;
            border-bottom-color: #3AACDE;
            background: #2a2a2a;
        }

        /* 右上：DVH/LETdVH/BEV/LET 内容区切换 */
        #dvhViewContainer {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #dvhViewContainer .dvh-top-content {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            display: none;
        }

        #dvhViewContainer .dvh-top-content.active {
            display: flex;
            flex-direction: column;
        }

        #dvhViewContainer .bottom-control-tabs-right {
            display: flex;
            align-items: center;
            padding-right: 8px;
            gap: 6px;
        }

        #dvhViewContainer .dvh-top-toolbar-host {
            display: none;
            align-items: center;
        }

        #dvhViewContainer .dvh-top-toolbar-host.active {
            display: flex;
        }

        /* LET 复用 2D 工具栏样式：挂到右侧 host 后做轻量化 */
        #dvhViewContainer #optLetToolbarHost .cross-section-view2d-toolbar {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            height: auto;
            gap: 0;
        }

        #dvhViewContainer #optLetToolbarHost .cross-section-view2d-toolbar .toolbar-title {
            display: none;
        }

        #dvhViewContainer #optLetToolbarHost .cross-section-view2d-toolbar .toolbar-group-right {
            margin-left: 0;
        }

        .bottom-control-content {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            display: none;
        }

        .bottom-control-content.active {
            display: flex;
            flex-direction: column;
        }

        /* 临床目标：内容区可滚动，工具栏常驻底部 */
        #clinicalTargetContent {
            overflow: hidden;
        }

        #clinicalTargetContainer {
            flex: 1;
            min-height: 0;
            display: flex;
            overflow: hidden;
        }

        #clinicalTargetContainer .clinical-target-component {
            flex: 1;
            min-height: 0;
        }

        .bottom-control-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* 左侧三视图区域：让内部2D工具栏浮到标签右侧 */
        #leftPanelContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #leftPanelContainer .bottom-control-tabs {
            flex: 0 0 auto;
        }

        #leftPanelContainer .left-view-content {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            display: none;
        }

        #leftPanelContainer .left-view-content.active {
            display: block;
        }

        #leftPanelContainer .cross-section-view2d-toolbar {
            position: absolute;
            top: 4px;
            right: 8px;
            left: auto;
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
        }

        #leftPanelContainer .cross-section-view2d-toolbar .toolbar-title {
            display: none;
        }

        #leftPanelContainer .cross-section-view2d-toolbar .toolbar-group-right {
            margin-left: 0;
        }

        /* 给画布主体留出一点顶部空间，避免被标签压住 */
        #leftPanelContainer .cross-section-view2d-main {
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="plan-optimization-content module-toolbar-layout-root">
        <div class="top-area">
            <div class="patient-overview">
                <div id="patientOverviewCard"></div>
            </div>
            <div class="toolbar-area" id="moduleToolbarContainer"></div>
        </div>

        <div class="content-wrapper">
            <div class="left-sidebar-tabs">
                <button class="sidebar-tab active" data-panel="series" title="序列树">序列树</button>
                <button class="sidebar-tab" data-panel="roi" title="ROI">ROI</button>
                <button class="sidebar-tab" data-panel="poi" title="POI">POI</button>
                <button class="sidebar-tab" data-panel="reg" title="REG">REG</button>
                <button class="sidebar-tab" data-panel="dose" title="DOSE">DOSE</button>
            </div>

            <div class="left-sidebar-content">
                <div class="sidebar-content-panel active" id="seriesPanel">
                    <div class="sidebar-panel-body">
                        <div id="planSequenceContainer">
                            <div class="loading-indicator" style="display: flex; align-items: center; justify-content: center; padding: 20px; color: #888;">
                                <i class="fas fa-spinner fa-spin"></i>
                                <span style="margin-left: 10px;">加载序列树组件...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-content-panel" id="roiPanel">
                    <div class="sidebar-panel-body" id="roiContainer"></div>
                </div>

                <div class="sidebar-content-panel" id="poiPanel">
                    <div class="sidebar-panel-body" id="poiContainer"></div>
                </div>

                <div class="sidebar-content-panel" id="regPanel">
                    <div class="sidebar-panel-body">
                        <div class="registration-container" id="planRegistrationContainer">
                            <div class="loading-indicator" style="display: flex; align-items: center; justify-content: center; padding: 20px; color: #888;">
                                <i class="fas fa-spinner fa-spin"></i>
                                <span style="margin-left: 10px;">加载配准组件...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-content-panel" id="dosePanel">
                    <div class="sidebar-panel-body" id="doseContainer"></div>
                </div>
            </div>

            <div class="main-content-area">
                <div class="view-row-2">
                    <div class="view-row-2-split">
                        <div class="view-panel" id="leftPanelContainer">
                            <div class="bottom-control-tabs">
                                <div class="bottom-control-tabs-left">
                                    <button class="bottom-control-tab active" data-tab="axialView">Axial</button>
                                    <button class="bottom-control-tab" data-tab="sagittalView">Sagittal</button>
                                    <button class="bottom-control-tab" data-tab="coronalView">Coronal</button>
                                </div>
                            </div>
                            <div class="left-view-content active" id="axialViewContainer"></div>
                            <div class="left-view-content" id="sagittalViewContainer"></div>
                            <div class="left-view-content" id="coronalViewContainer"></div>
                        </div>
                    </div>
                    <div class="view-panel" id="dvhViewContainer">
                        <div class="bottom-control-tabs">
                            <div class="bottom-control-tabs-left">
                                <button class="bottom-control-tab active" data-tab="dvhView">DVH</button>
                                <button class="bottom-control-tab" data-tab="letdvhView">LETdVH</button>
                                <button class="bottom-control-tab" data-tab="bevView">BEV</button>
                                <button class="bottom-control-tab" data-tab="letView">LET</button>
                            </div>
                            <div class="bottom-control-tabs-right">
                                <div id="optDvhToolbarHost" class="dvh-top-toolbar-host"></div>
                                <div id="optLETdVhToolbarHost" class="dvh-top-toolbar-host"></div>
                                <div id="optBevToolbarHost" class="dvh-top-toolbar-host"></div>
                                <div id="optLetToolbarHost" class="dvh-top-toolbar-host"></div>
                            </div>
                        </div>
                        <div class="dvh-top-content active" id="dvhViewContent"></div>
                        <div class="dvh-top-content" id="letdvhViewContent"></div>
                        <div class="dvh-top-content" id="bevViewContent"></div>
                        <div class="dvh-top-content" id="letViewContent"></div>
                    </div>
                </div>

                <!-- 底部控制区域壳子：一分为二，左右 5:1 -->
                <div class="bottom-control-panel" id="bottomControlPanel">
                    <div id="bottomControlLeft">
                        <div class="bottom-control-tabs">
                            <div class="bottom-control-tabs-left">
                                <button class="bottom-control-tab active" data-tab="optConstraints">优化约束</button>
                                <button class="bottom-control-tab" data-tab="clinicalTarget">临床目标</button>
                                <button class="bottom-control-tab" data-tab="doseStats">剂量统计</button>
                                <button class="bottom-control-tab" data-tab="letdStats">LETd统计</button>
                                <button class="bottom-control-tab" data-tab="energyLayer">能量层</button>
                                <button class="bottom-control-tab" data-tab="beamList">射束列表</button>
                                <button class="bottom-control-tab" data-tab="beamOptimization">射束优化设置</button>
                                <button class="bottom-control-tab" data-tab="lineDose">线剂量</button>
                            </div>
                            <div class="bottom-control-tabs-right" id="bottomControlTabsRight"></div>
                        </div>
                        <!-- 下面预留内容区域，后续再挂具体组件 -->
                        <div class="bottom-control-content active" id="optConstraintsContent"></div>
                        <div class="bottom-control-content" id="clinicalTargetContent">
                            <div id="clinicalTargetContainer"></div>
                        </div>
                        <div class="bottom-control-content" id="doseStatsContent"></div>
                        <div class="bottom-control-content" id="letdStatsContent"></div>
                        <div class="bottom-control-content" id="energyLayerContent"></div>
                        <div class="bottom-control-content" id="beamListContent"></div>
                        <div class="bottom-control-content" id="beamOptimizationContent"></div>
                        <div class="bottom-control-content" id="lineDoseContent"></div>
                    </div>
                    <div id="bottomControlRight"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../shared/scripts/components/PatientOverviewComponent.js"></script>
    <script src="../../shared/scripts/components/SequenceTreeComponent.js"></script>
    <script src="../../shared/scripts/components/ROIComponent.js"></script>
    <script src="../../shared/scripts/components/POIComponent.js"></script>
    <script src="../../shared/scripts/components/RegistrationComponent.js"></script>
    <script src="../../shared/scripts/components/CrossSectionView2DComponent.js"></script>
    <script src="../../shared/scripts/components/CoronalView2DComponent.js"></script>
    <script src="../../shared/scripts/components/SagittalView2DComponent.js"></script>
    <script src="../scripts/ProtonView3DComponent.js"></script>
    <script src="../scripts/ProtonBeamEyeViewComponent.js"></script>
    <script src="../../shared/scripts/components/DVHComponent.js"></script>
    <script src="../scripts/LETdVHComponent.js"></script>
    <script src="../../shared/scripts/components/ClinicalTargetComponent.js"></script>
    <script src="../../shared/scripts/components/DoseStatisticsComponent.js"></script>
    <script src="../../shared/scripts/components/ModuleToolbarComponent.js"></script>
    <script src="../../shared/scripts/components/DOSEComponent.js"></script>
    <script src="../../shared/scripts/components/OptimizationConstraintsComponent.js"></script>
    <script src="../scripts/LETComponent.js"></script>
    <script src="../scripts/LETdStatisticsComponent.js"></script>

    <script>
        let planSequenceTreeComponent = null;
        let roiComponent = null;
        let poiComponent = null;
        let registrationComponent = null;
        let moduleToolbar = null;
        let doseComponent = null;
        let patientOverviewComponent = null;
        let clinicalTargetComponent = null;
        let doseStatisticsComponent = null;
        let letdStatisticsComponent = null;

        let leftAxialViewComponent = null;
        let leftSagittalViewComponent = null;
        let leftCoronalViewComponent = null;

        let optimizationDVHComponent = null;
        let optimizationLETdVHComponent = null;
        let optimizationBEVComponent = null;
        let optimizationLETComponent = null;

        const defaultPatient = {
            name: 'Li Shan',
            id: 'WP4TR3',
            birthDate: '19760613',
            gender: 'F'
        };

        document.addEventListener('DOMContentLoaded', function () {
            patientOverviewComponent = new PatientOverviewComponent('patientOverviewCard', {
                patient: defaultPatient
            });

            const sidebarTabs = document.querySelectorAll('.sidebar-tab');
            const contentPanels = document.querySelectorAll('.sidebar-content-panel');
            const panelMap = {
                'series': 'seriesPanel',
                'roi': 'roiPanel',
                'poi': 'poiPanel',
                'reg': 'regPanel',
                'dose': 'dosePanel'
            };

            sidebarTabs.forEach(tab => {
                tab.addEventListener('click', function () {
                    const panelName = this.getAttribute('data-panel');
                    const panelId = panelMap[panelName];
                    if (!panelId) return;
                    sidebarTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    contentPanels.forEach(p => p.classList.remove('active'));
                    document.getElementById(panelId).classList.add('active');
                });
            });

            const bottomControlTabs = document.querySelectorAll('.bottom-control-panel .bottom-control-tab');
            const bottomControlContents = document.querySelectorAll('.bottom-control-panel .bottom-control-content');

            bottomControlTabs.forEach(tab => {
                tab.addEventListener('click', function () {
                    const tabName = this.getAttribute('data-tab');
                    const contentId = tabName + 'Content';
                    bottomControlTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    bottomControlContents.forEach(c => c.classList.remove('active'));
                    const targetContent = document.getElementById(contentId);
                    if (targetContent) {
                        targetContent.classList.add('active');
                    }
                    if (tabName === 'doseStats') {
                        initDoseStatisticsComponent();
                    }
                    if (tabName === 'letdStats') {
                        initLETdStatisticsComponent();
                    }
                    // 优化约束的「列表字段设置」按钮仅在「优化约束」页签下显示
                    const tabsRight = document.getElementById('bottomControlTabsRight');
                    if (tabsRight) {
                        const settingsBtn = tabsRight.querySelector('.opt-column-settings-btn');
                        if (settingsBtn) {
                            settingsBtn.style.display = tabName === 'optConstraints' ? '' : 'none';
                        }
                    }
                });
            });

            // 顶部左侧三视图（Axial/Sagittal/Coronal）标签，仅做选中态切换
            const leftViewTabs = document.querySelectorAll('#leftPanelContainer .bottom-control-tab');
            leftViewTabs.forEach(tab => {
                tab.addEventListener('click', function () {
                    const tabName = this.getAttribute('data-tab');
                    leftViewTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    switchLeftView(tabName);
                });
            });

            // 顶部右侧 DVH/LETdVH/BEV/LET 标签，仅做选中态切换
            const dvhViewTabs = document.querySelectorAll('#dvhViewContainer .bottom-control-tab');
            dvhViewTabs.forEach(tab => {
                tab.addEventListener('click', function () {
                    const tabName = this.getAttribute('data-tab');
                    dvhViewTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    switchOptimizationTopRightView(tabName);
                });
            });

            initComponents();
            switchLeftView('axialView');
            switchOptimizationTopRightView('dvhView');

            // 初始化优化约束列表组件
            const optContainer = document.getElementById('optConstraintsContent');
            if (optContainer && typeof OptimizationConstraintsComponent !== 'undefined') {
                const optComponent = new OptimizationConstraintsComponent({
                    columnSettingsHost: document.getElementById('bottomControlTabsRight')
                });
                optComponent.mount(optContainer);
            }
        });

        function switchOptimizationTopRightView(tabName) {
            const tabToContentId = {
                dvhView: 'dvhViewContent',
                letdvhView: 'letdvhViewContent',
                bevView: 'bevViewContent',
                letView: 'letViewContent'
            };

            const contentIds = Object.values(tabToContentId);
            contentIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('active');
            });

            const targetContentId = tabToContentId[tabName];
            const targetEl = targetContentId ? document.getElementById(targetContentId) : null;
            if (targetEl) targetEl.classList.add('active');

            // toolbar host 切换（DVH/LETdVH/BEV 可外置工具栏；LET 复用 2D 组件内部工具栏）
            const dvhHost = document.getElementById('optDvhToolbarHost');
            const letdvhHost = document.getElementById('optLETdVhToolbarHost');
            const bevHost = document.getElementById('optBevToolbarHost');
            const letHost = document.getElementById('optLetToolbarHost');
            [dvhHost, letdvhHost, bevHost, letHost].forEach(h => h && h.classList.remove('active'));
            if (tabName === 'dvhView' && dvhHost) dvhHost.classList.add('active');
            if (tabName === 'letdvhView' && letdvhHost) letdvhHost.classList.add('active');
            if (tabName === 'bevView' && bevHost) bevHost.classList.add('active');
            if (tabName === 'letView' && letHost) letHost.classList.add('active');

            if (tabName === 'dvhView') initOptimizationDVHView();
            if (tabName === 'letdvhView') initOptimizationLETdVHView();
            if (tabName === 'bevView') initOptimizationBEVView();
            if (tabName === 'letView') initOptimizationLETView();

            // 组件在隐藏状态初始化会拿到 0 尺寸，这里统一在切换到可见时触发一次重算/重绘
            if (tabName === 'dvhView' && optimizationDVHComponent?.setupCanvas && optimizationDVHComponent?.draw) {
                optimizationDVHComponent.setupCanvas();
                optimizationDVHComponent.draw();
            }
            if (tabName === 'letdvhView' && optimizationLETdVHComponent?.setupCanvas && optimizationLETdVHComponent?.draw) {
                optimizationLETdVHComponent.setupCanvas();
                optimizationLETdVHComponent.draw();
            }
            if (tabName === 'bevView' && optimizationBEVComponent?.resizeCanvas && optimizationBEVComponent?.renderAll) {
                optimizationBEVComponent.resizeCanvas();
                optimizationBEVComponent.renderAll();
            }
            if (tabName === 'letView' && optimizationLETComponent?.resizeCanvas && optimizationLETComponent?.renderAll) {
                optimizationLETComponent.resizeCanvas();
                optimizationLETComponent.renderAll();
            }
        }

        function initOptimizationDVHView() {
            if (optimizationDVHComponent || typeof DVHComponent === 'undefined') return;
            const container = document.getElementById('dvhViewContent');
            if (!container) return;
            container.innerHTML = '';
            optimizationDVHComponent = new DVHComponent(container, {
                showHeader: false,
                toolbarTitle: 'DVH',
                toolbarContainerId: 'optDvhToolbarHost'
            });
        }

        function initOptimizationLETdVHView() {
            if (optimizationLETdVHComponent || typeof LETdVHComponent === 'undefined') return;
            const container = document.getElementById('letdvhViewContent');
            if (!container) return;
            container.innerHTML = '';
            optimizationLETdVHComponent = new LETdVHComponent(container, {
                showHeader: false,
                toolbarTitle: 'LETdVH',
                toolbarContainerId: 'optLETdVhToolbarHost'
            });
        }

        function initOptimizationBEVView() {
            if (optimizationBEVComponent || typeof ProtonBeamEyeViewComponent === 'undefined') return;
            const container = document.getElementById('bevViewContent');
            if (!container) return;
            container.innerHTML = '';
            optimizationBEVComponent = new ProtonBeamEyeViewComponent(container, {
                showHeader: false,
                toolbarTitle: 'BEV',
                toolbarContainerId: 'optBevToolbarHost'
            });
        }

        function initOptimizationLETView() {
            if (optimizationLETComponent || typeof LETComponent === 'undefined') return;
            const container = document.getElementById('letViewContent');
            if (!container) return;
            container.innerHTML = '';
            // 注意：CrossSectionView2DComponent 用 containerId 拼接内部 DOM id（如 `${containerId}-pan`）。
            // 这里必须传字符串 id，否则会出现 `[object HTMLDivElement]-pan` 之类的无效 id，导致按钮图标不可见。
            optimizationLETComponent = new LETComponent('letViewContent', {
                enableToolbar: true,
                enableLayerControl: true,
                showDoseLegend: true,
                contoursVisible: false
            });

            // 将 LET 的 2D 工具栏挪到页签右侧（对齐左侧三视图的交互体验）
            const host = document.getElementById('optLetToolbarHost');
            if (host) {
                const toolbar = container.querySelector('.cross-section-view2d-toolbar');
                if (toolbar) {
                    host.innerHTML = '';
                    host.appendChild(toolbar);
                }
            }
        }

        function switchLeftView(tabName) {
            const viewIds = ['axialViewContainer', 'sagittalViewContainer', 'coronalViewContainer'];
            viewIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('active');
            });

            const targetId = tabName + 'Container';
            const targetEl = document.getElementById(targetId);
            if (targetEl) targetEl.classList.add('active');

            if (tabName === 'axialView') initLeftAxialView();
            if (tabName === 'sagittalView') initLeftSagittalView();
            if (tabName === 'coronalView') initLeftCoronalView();
        }

        function initLeftAxialView() {
            if (leftAxialViewComponent || typeof CrossSectionView2DComponent === 'undefined') return;
            const container = document.getElementById('axialViewContainer');
            if (!container) return;
            container.innerHTML = '';
            leftAxialViewComponent = new CrossSectionView2DComponent('axialViewContainer', {
                enableToolbar: true,
                enableLayerControl: true,
                showDoseLegend: false,
                contoursVisible: false
            });
        }

        function initLeftSagittalView() {
            if (leftSagittalViewComponent || typeof SagittalView2DComponent === 'undefined') return;
            const container = document.getElementById('sagittalViewContainer');
            if (!container) return;
            container.innerHTML = '';
            leftSagittalViewComponent = new SagittalView2DComponent('sagittalViewContainer', {
                enableToolbar: true,
                enableLayerControl: true,
                showDoseLegend: false,
                contoursVisible: false
            });
        }

        function initLeftCoronalView() {
            if (leftCoronalViewComponent || typeof CoronalView2DComponent === 'undefined') return;
            const container = document.getElementById('coronalViewContainer');
            if (!container) return;
            container.innerHTML = '';
            leftCoronalViewComponent = new CoronalView2DComponent('coronalViewContainer', {
                enableToolbar: true,
                enableLayerControl: true,
                showDoseLegend: false,
                contoursVisible: false
            });
        }

        function initComponents() {
            if (window.SequenceTreeComponent) {
                const container = document.getElementById('planSequenceContainer');
                if (container) {
                    container.innerHTML = '';
                    planSequenceTreeComponent = new SequenceTreeComponent('planSequenceContainer', {
                        prefix: 'plan-opt-',
                        onSequenceSelect: function (sequenceName, element) {
                            console.log('计划优化序列选择:', sequenceName);
                        },
                        onFileSelect: function (fileName, element) {
                            console.log('计划优化文件选择:', fileName);
                        },
                        showFileInfo: false
                    });
                }
            }

            if (typeof ModuleToolbarComponent !== 'undefined') {
                const optimizationTools = [
                    { id: 'start-optimization', icon: 'fas fa-play', label: '开始优化', tooltip: '开始优化', category: '常规' },
                    { id: 'continue-optimization', icon: 'fas fa-forward', label: '继续优化', tooltip: '继续优化', category: '常规' },
                    { id: 'cancel-optimization', icon: 'fas fa-stop', label: '取消优化', tooltip: '取消优化', category: '常规' },
                    { id: 'robust-settings', icon: 'fas fa-shield-alt', label: '鲁棒性设置', tooltip: '鲁棒性设置', category: '常规' },
                    { id: 'optimization-settings', icon: 'fas fa-cog', label: '优化设置', tooltip: '优化设置', category: '常规' },
                    { id: 'dose-calculation', icon: 'fas fa-calculator', label: '剂量计算', tooltip: '剂量计算', category: '常规' },
                    { id: 'dose-scaling', icon: 'fas fa-sliders-h', label: '剂量缩放', tooltip: '剂量缩放', category: '常规' }
                ];

                moduleToolbar = new ModuleToolbarComponent('moduleToolbarContainer', {
                    tools: optimizationTools,
                    categories: ['常规'],
                    moduleId: 'plan-optimization-v2',
                    onToolClick: (toolId) => {
                        console.log('计划优化工具点击:', toolId);
                    }
                });
            }

            if (typeof ROIComponent !== 'undefined') {
                roiComponent = new ROIComponent('roiContainer', {
                    prefix: 'plan-opt-',
                    onROISelect: (roiName) => {
                        console.log('计划优化选中ROI:', roiName);
                    }
                });
            }

            if (typeof POIComponent !== 'undefined') {
                poiComponent = new POIComponent('poiContainer', {
                    prefix: 'plan-opt-',
                    onPOISelect: (poiName) => {
                        console.log('计划优化选中POI:', poiName);
                    },
                    onToolClick: (buttonId) => {
                        console.log('计划优化POI工具点击:', buttonId);
                    }
                });
            }

            if (typeof RegistrationComponent !== 'undefined') {
                const registrationContainer = document.getElementById('planRegistrationContainer');
                if (registrationContainer) {
                    registrationContainer.innerHTML = '';
                    registrationComponent = new RegistrationComponent('planRegistrationContainer', {
                        prefix: 'plan-opt-',
                        onRegistrationSelect: function (registrationId, element) {
                            console.log('计划优化配准选择:', registrationId);
                        },
                        onSequenceSelect: function (sequenceName, element) {
                            console.log('计划优化配准序列选择:', sequenceName);
                        },
                        onFileSelect: function (fileName, element) {
                            console.log('计划优化配准文件选择:', fileName);
                        },
                        showFileInfo: true
                    });
                }
            }

            if (typeof DOSEComponent !== 'undefined') {
                if (document.getElementById('doseContainer')) {
                    doseComponent = new DOSEComponent('doseContainer', {
                        prefix: 'plan-opt-',
                        onDoseTypeChange: (doseType) => {
                            console.log('计划优化剂量类型变更:', doseType);
                        },
                        onDoseSourceChange: (doseSource) => {
                            console.log('计划优化剂量源变更:', doseSource);
                        },
                        onGlobalVisibilityToggle: (visible) => {
                            console.log('计划优化全局可见性切换:', visible);
                        },
                        onFillToggle: (fillEnabled) => {
                            console.log('计划优化填充切换:', fillEnabled);
                        },
                        onBoldToggle: (boldEnabled) => {
                            console.log('计划优化加粗切换:', boldEnabled);
                        }
                    });
                }
            }

            if (typeof ClinicalTargetComponent !== 'undefined' && document.getElementById('clinicalTargetContainer')) {
                clinicalTargetComponent = new ClinicalTargetComponent('clinicalTargetContainer', {
                    prefix: 'plan-opt-',
                    onTargetSelect: (target) => console.log('计划优化选中临床目标:', target),
                    onTargetAdd: () => console.log('计划优化添加临床目标'),
                    onTargetEdit: (target) => console.log('计划优化编辑临床目标:', target),
                    onTargetDelete: (target) => console.log('计划优化删除临床目标:', target),
                    onTargetExport: (targets) => console.log('计划优化导出临床目标:', targets),
                    onTargetImport: () => console.log('计划优化导入临床目标')
                });
            }
        }

        function initDoseStatisticsComponent() {
            if (typeof DoseStatisticsComponent !== 'undefined') {
                // 计划优化页：剂量统计挂载到 #doseStatsContent（tab 对应的内容容器）
                const doseStatsHost = document.getElementById('doseStatsContent');
                if (doseStatsHost && !doseStatsHost.dataset.inited) {
                    doseStatisticsComponent = new DoseStatisticsComponent('doseStatsContent', {
                        showDoseType: false,
                        getRoiStats: () => null,
                        getPoiStats: () => null,
                        onExport: (data) => {
                            console.log('计划优化导出剂量统计:', data);
                            if (doseStatisticsComponent) {
                                doseStatisticsComponent.defaultExportToExcel({
                                    planName: 'PlanA',
                                    patientId: defaultPatient.id,
                                    patientName: defaultPatient.name,
                                    comparisonMode: null
                                });
                            }
                        }
                    });
                    doseStatsHost.dataset.inited = 'true';
                }
            }
        }

        function initLETdStatisticsComponent() {
            if (typeof LETdStatisticsComponent !== 'undefined') {
                // 计划优化页：LETd统计挂载到 #letdStatsContent（tab 对应的内容容器）
                const letdStatsHost = document.getElementById('letdStatsContent');
                if (letdStatsHost && !letdStatsHost.dataset.inited) {
                    letdStatsHost.innerHTML = '';
                    letdStatisticsComponent = new LETdStatisticsComponent('letdStatsContent', {
                        getGlobalStats: () => null,
                        getRoiStats: () => null
                    });
                    letdStatsHost.dataset.inited = 'true';
                }
            }
        }
    </script>
</body>
</html>
